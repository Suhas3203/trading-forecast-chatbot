services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: tradebot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install poetry && poetry install --no-root --without dev
    startCommand: poetry run uvicorn main:app --host 0.0.0.0 --port $PORT
    pythonVersion: "3.12"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: ALLOWED_ORIGINS
        sync: false   # set to your frontend URL after it's deployed

  # ── React frontend (static site) ─────────────────────────────────────────────
  - type: web
    name: tradebot-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to https://tradebot-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
