services:
  - type: web
    name: tradebot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install poetry && poetry install --no-root --without dev
    startCommand: poetry run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
    pythonVersion: "3.12"
